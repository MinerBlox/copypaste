<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Linkboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0e0e0e;--surface:#171717;--surface2:#1d1d1d;--border:#2b2b2b;--text:#eee;--muted:#747474;--green:#35c46a;--amber:#e8a020;--danger:#df5b52;--r:10px}html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}body{padding-bottom:110px}button,input,textarea{font:inherit}button{touch-action:manipulation}header{display:flex;align-items:center;gap:14px;padding:30px clamp(16px,4vw,48px) 0;max-width:1200px;margin:auto}.brand{font:500 13px 'DM Mono',monospace;letter-spacing:.15em;text-transform:uppercase}.mode{font:400 10px 'DM Mono',monospace;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}.spacer{flex:1}.home,.add-top{border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:8px;padding:9px 12px;text-decoration:none;font:400 11px 'DM Mono',monospace;cursor:pointer}.home:hover,.add-top:hover{color:var(--text);border-color:#4a4a4a}.toolbar{max-width:1200px;margin:22px auto 0;padding:0 clamp(16px,4vw,48px);display:flex;gap:10px;align-items:center}.search{flex:1;max-width:390px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:11px 13px;outline:none}.search:focus{border-color:#555}.tabs{max-width:1200px;margin:12px auto 0;padding:0 clamp(16px,4vw,48px);display:flex;gap:7px;overflow:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.pill{flex:none;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:999px;padding:7px 13px;font:400 10px 'DM Mono',monospace;cursor:pointer}.pill.active{background:var(--text);color:var(--bg);border-color:var(--text)}main{max-width:1200px;margin:auto;padding:20px clamp(16px,4vw,48px)}#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}.section-label{grid-column:1/-1;color:#444;font:400 10px 'DM Mono',monospace;text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:10px;padding-top:4px}.section-label:after{content:'';height:1px;background:#222;flex:1}.card{position:relative;min-width:0}.copy{width:100%;min-height:116px;height:100%;display:flex;flex-direction:column;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;color:var(--text);cursor:pointer;transition:.15s}.copy:hover{background:var(--surface2);border-color:#474747}.copy.copied{border-color:var(--green);background:#102117}.copy.selected{border-color:var(--green);background:#102117;box-shadow:inset 0 0 0 1px rgba(53,196,106,.15)}.thumb{width:100%;aspect-ratio:16/9;object-fit:cover;border-bottom:1px solid var(--border)}.label{padding:16px 50px 8px 15px;font-weight:500;line-height:1.35}.cat{padding:0 15px 8px;color:var(--muted);font:400 10px 'DM Mono',monospace;margin-top:auto}.card-footer{display:flex;justify-content:flex-end;padding:0 10px 10px;margin-top:auto}.dollar{width:25px;height:25px;border:1px solid var(--border);background:transparent;color:#444;border-radius:6px;font:500 13px 'DM Mono',monospace;cursor:pointer}.dollar.on{color:var(--green);border-color:var(--green);background:rgba(53,196,106,.1)}.actions{position:absolute;right:8px;top:8px;display:flex;gap:5px}.icon{width:32px;height:32px;border:1px solid var(--border);border-radius:7px;background:rgba(14,14,14,.92);color:var(--muted);cursor:pointer}.icon:hover{color:var(--text);border-color:#555}.icon.pin.on{color:var(--amber);border-color:#5a451d}.icon.delete:hover{color:var(--danger);border-color:var(--danger)}.pin-dot{position:absolute;left:8px;top:8px;width:7px;height:7px;border-radius:50%;background:var(--amber);z-index:2}.select-mark{position:absolute;left:8px;top:8px;width:28px;height:28px;border-radius:50%;display:grid;place-items:center;border:1px solid #555;background:rgba(14,14,14,.92);color:transparent;font-weight:600;z-index:3}.copy.selected .select-mark{background:var(--green);border-color:var(--green);color:#08150d}.empty{grid-column:1/-1;padding:50px 4px;color:var(--muted);font:400 12px 'DM Mono',monospace}.fab,.create-bar button{border:0;border-radius:999px;background:var(--text);color:var(--bg);padding:14px 19px;font:500 12px 'DM Mono',monospace;box-shadow:0 10px 35px #000;cursor:pointer}.fab{position:fixed;right:max(18px,env(safe-area-inset-right));bottom:max(18px,env(safe-area-inset-bottom))}.create-bar{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);display:none;align-items:center;gap:12px;background:#151515;border:1px solid var(--border);border-radius:999px;padding:7px 7px 7px 16px;z-index:12;box-shadow:0 12px 40px #000}.create-bar.show{display:flex}.count{white-space:nowrap;color:var(--muted);font:400 11px 'DM Mono',monospace}.create-bar button:disabled{opacity:.35;cursor:not-allowed}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:16px;z-index:20}.overlay.open{display:flex}.modal{width:min(540px,100%);max-height:92vh;overflow:auto;background:#121212;border:1px solid var(--border);border-radius:14px;padding:24px}.modal h2{font:500 12px 'DM Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}.field{margin-bottom:15px}.field label{display:block;color:var(--muted);font:400 10px 'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}.field input,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--text);outline:none}.field textarea{min-height:150px;resize:vertical}.modal-actions{display:flex;gap:8px;margin-top:20px}.modal-actions button{flex:1;border-radius:8px;padding:11px;border:1px solid var(--border);cursor:pointer}.cancel{background:transparent;color:var(--muted)}.save{background:var(--text);color:var(--bg);border-color:var(--text)!important}.toast{position:fixed;left:50%;bottom:25px;transform:translate(-50%,12px);opacity:0;background:#222;border:1px solid #3a3a3a;color:var(--text);padding:9px 15px;border-radius:999px;font:400 11px 'DM Mono',monospace;transition:.2s;pointer-events:none;z-index:30}.toast.show{opacity:1;transform:translate(-50%,0)}#resultView{display:none;min-height:100vh;padding:max(24px,env(safe-area-inset-top)) max(18px,env(safe-area-inset-right)) max(24px,env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left));background:#fff;color:#111}#resultView.open{display:block}#app.hidden{display:none}.result-wrap{width:min(820px,100%);margin:0 auto}.result-actions{display:flex;gap:8px;margin-bottom:28px}.result-actions button{border:1px solid #d6d6d6;background:#fff;color:#111;border-radius:9px;padding:10px 14px;cursor:pointer}.result-actions .primary{background:#111;color:#fff;border-color:#111}.result-text{white-space:pre-wrap;font:400 clamp(15px,2vw,18px)/1.7 'DM Sans',sans-serif;overflow-wrap:anywhere}
@media(max-width:640px){body{padding-bottom:96px}header{padding-top:20px;flex-wrap:wrap}.brand{font-size:12px}.mode{order:3;width:100%}.home,.add-top{padding:9px 10px}.toolbar{margin-top:16px}.search{max-width:none;font-size:16px}main{padding-top:15px}#grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.copy{min-height:108px}.label{padding:13px 42px 7px 12px;font-size:13px}.cat{padding:0 12px 8px}.actions{right:6px;top:6px}.icon{width:30px;height:30px}.modal{padding:20px}.fab{padding:13px 17px}.create-bar{width:calc(100% - 28px);justify-content:space-between}.result-actions{position:sticky;top:0;background:#fff;padding:4px 0 12px;z-index:2}}
@media(max-width:370px){#grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
<header><div class="brand">Linkboard</div><div class="mode" id="modeLabel"></div><div class="spacer"></div><a class="home" href="./">menu</a><button class="add-top" id="addTop">+ add</button></header>
<div class="toolbar"><input class="search" id="search" placeholder="Search links…" autocomplete="off"></div>
<div class="tabs" id="tabs"></div>
<main><div id="grid"></div></main>
<button class="fab" id="fab">+ ADD LINK</button>
<div class="create-bar" id="createBar"><span class="count" id="selectionCount">0 selected</span><button id="createBtn" disabled>CREATE</button></div>
<div class="overlay" id="overlay"><div class="modal"><h2 id="modalTitle">New link</h2><div class="field"><label>Label</label><input id="label" autocomplete="off"></div><div class="field"><label>Copy text / URL</label><textarea id="text"></textarea></div><div class="field"><label>Category</label><input id="category" autocomplete="off"></div><div class="field"><label>Image URL (optional)</label><input id="image" type="url" autocomplete="off"></div><div class="modal-actions"><button class="cancel" id="cancel">Cancel</button><button class="save" id="save">Save</button></div></div></div>
<div class="toast" id="toast"></div>
</div>
<section id="resultView"><div class="result-wrap"><div class="result-actions"><button id="backBtn">← BACK</button><button class="primary" id="copyResultBtn">COPY</button></div><div class="result-text" id="resultText"></div></div></section>
<script>
const SUPABASE_URL='https://pqneseicmwdrxstxtgdu.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxbmVzZWljbXdkcnhzdHh0Z2R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDQ1NDIsImV4cCI6MjA4OTIyMDU0Mn0.wFiG9MUu_vEOWfa7SbHjMbb17Bwh3B4Woqw3DRZB8dg';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);const params=new URLSearchParams(location.search);const quick=params.get('view')==='quick';let buttons=[],active='All',query='',editing=null,selected=new Set(),generatedText='';
const $=id=>document.getElementById(id);$('modeLabel').textContent=quick?'Quick Links Builder':'Full Linkboard';document.title=quick?'Quick Links Builder — Linkboard':'Full Linkboard — Linkboard';if(quick){$('fab').style.display='none';$('addTop').style.display='none';$('createBar').classList.add('show')}
function row(r){return{id:r.id,label:r.label,text:r.text||'',category:r.category||'',imageData:r.image_data||'',position:r.position||0,pinned:!!r.pinned,flagged:!!r.flagged}}
function db(b){return{id:b.id,label:b.label,text:b.text,category:b.category||null,has_image:!!b.imageData,image_data:b.imageData||null,position:b.position||0,pinned:!!b.pinned,flagged:!!b.flagged}}
function toast(s){const t=$('toast');t.textContent=s;t.classList.add('show');clearTimeout(t.x);t.x=setTimeout(()=>t.classList.remove('show'),1400)}
async function load(){const{data,error}=await sb.from('buttons').select('*').order('position').order('created_at');if(error){toast('Could not load links');return}buttons=data.map(row);render();subscribe()}
function subscribe(){sb.channel('linkboard-builder').on('postgres_changes',{event:'*',schema:'public',table:'buttons'},()=>loadSilent()).subscribe()}
async function loadSilent(){const{data}=await sb.from('buttons').select('*').order('position').order('created_at');if(data){buttons=data.map(row);selected=new Set([...selected].filter(id=>buttons.some(b=>b.id===id)));render()}}
function categories(){return['All',...new Set(buttons.map(b=>b.category).filter(Boolean))]}
function render(){const cats=categories();if(!cats.includes(active))active='All';$('tabs').innerHTML='';cats.forEach(c=>{const x=document.createElement('button');x.className='pill'+(c===active?' active':'');x.textContent=c;x.onclick=()=>{active=c;render()};$('tabs').appendChild(x)});const visible=buttons.filter(b=>(active==='All'||b.category===active)&&(!query||b.label.toLowerCase().includes(query)));visible.sort((a,b)=>Number(b.pinned)-Number(a.pinned)||a.position-b.position);$('grid').innerHTML='';if(!visible.length){$('grid').innerHTML='<div class="empty">No matching links.</div>';updateSelection();return}if(!quick){const pinned=visible.filter(b=>b.pinned),normal=visible.filter(b=>!b.pinned);if(pinned.length){addSection('pinned');pinned.forEach(b=>$('grid').appendChild(card(b)))}if(pinned.length&&normal.length)addSection('all');normal.forEach(b=>$('grid').appendChild(card(b)))}else visible.forEach(b=>$('grid').appendChild(card(b)));updateSelection()}
function addSection(text){const d=document.createElement('div');d.className='section-label';d.textContent=text;$('grid').appendChild(d)}
function card(b){const wrap=document.createElement('div');wrap.className='card';const copy=document.createElement('button');copy.className='copy'+(selected.has(b.id)?' selected':'');if(quick){const mark=document.createElement('span');mark.className='select-mark';mark.textContent='✓';copy.appendChild(mark)}else if(b.pinned){const dot=document.createElement('span');dot.className='pin-dot';copy.appendChild(dot)}if(b.imageData){const i=document.createElement('img');i.className='thumb';i.src=b.imageData;i.alt='';copy.appendChild(i)}const l=document.createElement('div');l.className='label';l.textContent=b.label;copy.appendChild(l);if(b.category){const c=document.createElement('div');c.className='cat';c.textContent=b.category;copy.appendChild(c)}if(!quick){const footer=document.createElement('div');footer.className='card-footer';const dollar=document.createElement('button');dollar.className='dollar'+(b.flagged?' on':'');dollar.textContent='$';dollar.title=b.flagged?'Unmark':'Mark';dollar.onclick=e=>{e.stopPropagation();toggleDollar(b)};footer.appendChild(dollar);copy.appendChild(footer)}copy.onclick=()=>quick?toggleSelect(b.id,copy):copyText(b.text,copy);if(!quick){const actions=document.createElement('div');actions.className='actions';const pin=document.createElement('button');pin.className='icon pin'+(b.pinned?' on':'');pin.textContent='⌖';pin.title=b.pinned?'Unpin':'Pin';pin.onclick=e=>{e.stopPropagation();togglePin(b)};const edit=document.createElement('button');edit.className='icon';edit.textContent='✎';edit.title='Edit';edit.onclick=e=>{e.stopPropagation();openModal(b)};const del=document.createElement('button');del.className='icon delete';del.textContent='×';del.title='Delete';del.onclick=e=>{e.stopPropagation();deleteLink(b)};actions.append(pin,edit,del);wrap.append(copy,actions)}else wrap.append(copy);return wrap}
function toggleSelect(id,el){selected.has(id)?selected.delete(id):selected.add(id);el.classList.toggle('selected',selected.has(id));updateSelection()}
function updateSelection(){const n=selected.size;$('selectionCount').textContent=`${n} selected`;$('createBtn').disabled=n===0}
function splitEntry(text){const blocks=text.trim().split(/\r?\n\s*\r?\n/).map(x=>x.trim()).filter(Boolean);return{item:blocks[0]||'',footer:blocks.slice(1).join('\n\n')}}
function createResult(){const chosen=buttons.filter(b=>selected.has(b.id));const items=[];let footer='';chosen.forEach(b=>{const part=splitEntry(b.text);if(part.item)items.push(part.item);if(!footer&&part.footer)footer=part.footer});generatedText=items.join('\n\n')+(footer?'\n\n'+footer:'');$('resultText').textContent=generatedText;$('app').classList.add('hidden');$('resultView').classList.add('open');window.scrollTo(0,0)}
function closeResult(){$('resultView').classList.remove('open');$('app').classList.remove('hidden');window.scrollTo(0,0)}
function copyText(text,el){const done=()=>{if(el){el.classList.add('copied');setTimeout(()=>el.classList.remove('copied'),900)}toast('Copied')};if(navigator.clipboard&&isSecureContext)navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));else fallback(text,done)}
function fallback(text,done){const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();done()}
async function togglePin(b){const old=b.pinned;b.pinned=!old;render();const{error}=await sb.from('buttons').update({pinned:b.pinned}).eq('id',b.id);if(error){b.pinned=old;render();toast('Pin update failed')}else toast(b.pinned?'Pinned':'Unpinned')}
async function toggleDollar(b){const old=b.flagged;b.flagged=!old;render();const{error}=await sb.from('buttons').update({flagged:b.flagged}).eq('id',b.id);if(error){b.flagged=old;render();toast('Update failed')}else toast(b.flagged?'Marked $':'Unmarked $')}
async function deleteLink(b){if(!confirm(`Delete “${b.label}”?`))return;const{error}=await sb.from('buttons').delete().eq('id',b.id);if(error)toast('Delete failed');else{buttons=buttons.filter(x=>x.id!==b.id);render();toast('Deleted')}}
function openModal(b=null){editing=b?.id||null;$('modalTitle').textContent=b?'Edit link':'New link';$('label').value=b?.label||'';$('text').value=b?.text||'';$('category').value=b?.category||'';$('image').value=b?.imageData||'';$('overlay').classList.add('open');setTimeout(()=>$('label').focus(),50)}
function closeModal(){$('overlay').classList.remove('open')}
async function save(){const label=$('label').value.trim(),text=$('text').value;if(!label||!text){toast('Add a label and copy text');return}const current=buttons.find(b=>b.id===editing);const b={id:editing||Date.now().toString(36)+Math.random().toString(36).slice(2,7),label,text,category:$('category').value.trim(),imageData:$('image').value.trim(),position:current?.position??buttons.length,pinned:current?.pinned||false,flagged:current?.flagged||false};closeModal();const result=editing?await sb.from('buttons').update(db(b)).eq('id',editing):await sb.from('buttons').insert(db(b));if(result.error){toast('Save failed');return}await loadSilent();toast(editing?'Saved':'Added')}
$('search').oninput=e=>{query=e.target.value.toLowerCase();render()};$('fab').onclick=$('addTop').onclick=()=>openModal();$('cancel').onclick=closeModal;$('save').onclick=save;$('overlay').onclick=e=>{if(e.target===$('overlay'))closeModal()};$('createBtn').onclick=createResult;$('backBtn').onclick=closeResult;$('copyResultBtn').onclick=()=>copyText(generatedText);document.onkeydown=e=>{if(e.key==='Escape'){$('resultView').classList.contains('open')?closeResult():closeModal()}if((e.ctrlKey||e.metaKey)&&e.key==='Enter'&&$('overlay').classList.contains('open'))save()};load();
</script>
</body>
</html>
