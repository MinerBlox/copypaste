<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Linkboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0} :root{--bg:#0e0e0e;--surface:#171717;--border:#2b2b2b;--text:#eee;--muted:#747474} html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif} body{display:grid;place-items:center;padding:max(22px,env(safe-area-inset-top)) max(18px,env(safe-area-inset-right)) max(22px,env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left))}.wrap{width:min(760px,100%)}.eyebrow{font:400 11px 'DM Mono',monospace;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}.title{font-size:clamp(38px,8vw,74px);line-height:.98;letter-spacing:-.055em;font-weight:500;max-width:650px}.sub{color:var(--muted);font-size:clamp(15px,2vw,18px);line-height:1.55;margin-top:20px;max-width:520px}.choices{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:42px}.choice{min-height:210px;border:1px solid var(--border);background:var(--surface);border-radius:16px;padding:25px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;transition:transform .18s,border-color .18s,background .18s}.choice:hover{transform:translateY(-3px);border-color:#515151;background:#1c1c1c}.number{font:400 11px 'DM Mono',monospace;color:var(--muted);letter-spacing:.12em}.choice h2{font-size:24px;line-height:1.1;margin-top:auto;font-weight:500;letter-spacing:-.025em}.choice p{color:var(--muted);font-size:14px;line-height:1.45;margin-top:10px}.arrow{font:400 17px 'DM Mono',monospace;margin-top:18px}.quick{border-color:#4b3a19}.quick:hover{border-color:#886b2c}@media(max-width:620px){body{place-items:start center;padding-top:42px}.title{font-size:44px}.choices{grid-template-columns:1fr;margin-top:32px}.choice{min-height:155px;padding:20px}.choice h2{font-size:21px;margin-top:28px}.arrow{position:absolute;right:20px;bottom:20px}.choice{position:relative;padding-right:58px}}@media(max-width:360px){.title{font-size:38px}}
</style>
</head>
<body>
<main class="wrap">
<div class="eyebrow">Linkboard</div>
<h1 class="title">What do you need?</h1>
<p class="sub">Open every saved link or jump straight into the smaller set you use most often.</p>
<div class="choices">
<a class="choice" href="board.html?view=full"><span class="number">01</span><h2>FULL LINKBOARD</h2><p>Browse, search, edit and copy every link.</p><span class="arrow">→</span></a>
<a class="choice quick" href="board.html?view=quick"><span class="number">02</span><h2>QUICK LINKS</h2><p>Only show links marked with the star.</p><span class="arrow">→</span></a>
</div>
</main>
</body>
</html>
