<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linkboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --border-hover: #444;
    --text: #e8e8e8;
    --muted: #666;
    --danger: #c0392b;
    --success: #27ae60;
    --radius: 6px;
    --font-mono: 'DM Mono', monospace;
    --font-sans: 'DM Sans', sans-serif;
  }

  html, body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-weight: 300; }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Header ── */
  header {
    padding: 40px 48px 0;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 {
    font-family: var(--font-mono); font-size: 13px; font-weight: 400;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
  }
  header .tagline { font-family: var(--font-mono); font-size: 11px; color: #333; letter-spacing: 0.05em; flex: 1; }

  .header-actions { display: flex; gap: 6px; margin-left: auto; align-items: center; }
  .header-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 11px; border-radius: var(--radius);
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.05em; cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .header-btn:hover { border-color: var(--border-hover); color: var(--text); background: var(--surface); }
  .header-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
  #import-file { display: none; }

  /* Sync status dot */
  #sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #333; transition: background 0.4s;
    flex-shrink: 0;
  }
  #sync-dot.syncing { background: #f0a500; }
  #sync-dot.ok      { background: var(--success); }
  #sync-dot.error   { background: var(--danger); }

  /* ── Toolbar ── */
  #toolbar { padding: 20px 48px 0; display: flex; flex-direction: column; gap: 14px; }

  .search-wrap { position: relative; max-width: 280px; }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 13px; height: 13px; color: var(--muted); pointer-events: none;
  }
  #search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px 8px 30px;
    color: var(--text); font-family: var(--font-mono); font-size: 12px; font-weight: 300;
    outline: none; transition: border-color 0.15s; letter-spacing: 0.03em;
  }
  #search-input:focus { border-color: #555; }
  #search-input::placeholder { color: #3a3a3a; }

  #cat-bar {
    display: flex; align-items: center; gap: 6px;
    overflow-x: auto; scrollbar-width: none; padding-bottom: 2px;
  }
  #cat-bar::-webkit-scrollbar { display: none; }

  .cat-pill {
    flex-shrink: 0; padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
    cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s; white-space: nowrap;
  }
  .cat-pill:hover { border-color: var(--border-hover); color: var(--text); }
  .cat-pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* ── Grid ── */
  main { flex: 1; padding: 24px 48px 48px; max-width: 1100px; width: 100%; }

  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }

  .btn-wrap { position: relative; }
  .btn-wrap:hover .btn-actions { opacity: 1; pointer-events: all; }

  .link-btn {
    width: 100%; padding: 0; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); cursor: pointer; text-align: left;
    transition: border-color 0.15s, background 0.15s; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .link-btn::after {
    content: ''; position: absolute; inset: 0; background: white; opacity: 0;
    transition: opacity 0.15s; border-radius: inherit; pointer-events: none;
  }
  .link-btn:hover { border-color: var(--border-hover); background: #1c1c1c; }
  .link-btn:active::after { opacity: 0.04; }
  .link-btn.copied { border-color: var(--success) !important; background: #0d1f14 !important; }

  .btn-image {
    width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;
    border-bottom: 1px solid var(--border); background: #1a1a1a; flex-shrink: 0;
  }
  .btn-label {
    padding: 14px 16px; font-family: var(--font-sans); font-size: 13px; font-weight: 400;
    letter-spacing: 0.01em; line-height: 1.4; min-height: 48px; display: flex; align-items: center;
  }
  .btn-cat-tag {
    padding: 0 16px 10px; font-family: var(--font-mono); font-size: 10px;
    color: #444; letter-spacing: 0.05em; margin-top: -6px;
  }

  .btn-actions {
    position: absolute; top: 6px; right: 6px; display: flex; gap: 4px;
    opacity: 0; pointer-events: none; transition: opacity 0.15s; z-index: 10;
  }
  .action-btn {
    width: 24px; height: 24px; border-radius: 4px; border: 1px solid var(--border);
    background: rgba(14,14,14,0.92); color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.1s, color 0.1s; flex-shrink: 0; backdrop-filter: blur(4px);
  }
  .action-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .action-btn.del:hover { border-color: var(--danger); color: var(--danger); }
  .action-btn svg { width: 11px; height: 11px; }

  .add-btn {
    width: 100%; padding: 16px 20px; background: transparent; border: 1px dashed #2a2a2a;
    border-radius: var(--radius); color: var(--muted); font-family: var(--font-sans);
    font-size: 13px; cursor: pointer; text-align: left;
    transition: border-color 0.15s, color 0.15s; min-height: 56px;
    display: flex; align-items: center; gap: 8px; letter-spacing: 0.02em;
  }
  .add-btn:hover { border-color: #444; color: var(--text); }
  .add-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* Floating action button — always visible */
  #fab {
    position: fixed; bottom: 32px; right: 36px;
    display: flex; align-items: center; gap: 8px;
    padding: 12px 20px;
    background: var(--text); color: var(--bg);
    border: none; border-radius: 24px;
    font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    letter-spacing: 0.08em; cursor: pointer;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    transition: background 0.15s, transform 0.15s;
    z-index: 50;
  }
  #fab:hover { background: #ccc; transform: translateY(-2px); }
  #fab svg { width: 13px; height: 13px; flex-shrink: 0; }

  .empty-state {
    grid-column: 1 / -1; padding: 40px 0 20px; color: #333;
    font-size: 12px; font-family: var(--font-mono); letter-spacing: 0.05em;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 24px;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: #111; border: 1px solid #2a2a2a; border-radius: 10px; padding: 28px;
    width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto;
    transform: translateY(8px); transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h2 {
    font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 22px; font-family: var(--font-mono);
  }

  .field { margin-bottom: 18px; }
  .field label {
    display: flex; align-items: center; gap: 8px; font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
    margin-bottom: 8px; font-family: var(--font-mono);
  }
  .field label .opt { font-size: 10px; color: #444; text-transform: none; letter-spacing: 0.02em; font-weight: 300; }

  .field input, .field textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px; color: var(--text);
    font-family: var(--font-sans); font-size: 13px; font-weight: 300;
    transition: border-color 0.15s; outline: none; line-height: 1.6;
  }
  .field textarea {
    resize: vertical; min-height: 200px; font-family: var(--font-mono); font-size: 12px;
  }
  .field input:focus, .field textarea:focus { border-color: #555; }
  .field input::placeholder, .field textarea::placeholder { color: #333; }

  .hint { font-size: 11px; color: #444; font-family: var(--font-mono); margin-top: 6px; letter-spacing: 0.03em; }

  .image-upload-area {
    border: 1px dashed var(--border); border-radius: var(--radius); padding: 24px 20px;
    text-align: center; cursor: pointer; transition: border-color 0.15s; position: relative; background: var(--bg);
  }
  .image-upload-area:hover { border-color: #444; }
  .image-upload-area input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
    width: 100%; height: 100%; padding: 0; border: none; background: none;
  }
  .upload-inner {
    pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 7px;
    color: var(--muted); font-size: 12px; font-family: var(--font-mono); letter-spacing: 0.05em;
  }
  .upload-inner svg { width: 22px; height: 22px; color: #3a3a3a; }

  .image-preview-wrap { position: relative; }
  .image-preview {
    width: 100%; max-height: 220px; object-fit: cover; border-radius: var(--radius);
    border: 1px solid var(--border); display: block;
  }
  .remove-image {
    position: absolute; top: 7px; right: 7px; background: rgba(14,14,14,0.9);
    border: 1px solid var(--border); color: var(--muted); border-radius: 4px;
    width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 14px; transition: color 0.1s, border-color 0.1s; line-height: 1;
  }
  .remove-image:hover { color: var(--danger); border-color: var(--danger); }

  .modal-actions { display: flex; gap: 8px; margin-top: 24px; }
  .modal-btn {
    flex: 1; padding: 11px; border-radius: var(--radius);
    font-family: var(--font-sans); font-size: 13px; font-weight: 400; cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s; border: 1px solid var(--border);
  }
  .modal-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .modal-btn.primary:hover { background: #ccc; border-color: #ccc; }
  .modal-btn.secondary { background: transparent; color: var(--muted); }
  .modal-btn.secondary:hover { background: #1a1a1a; color: var(--text); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: #1e1e1e; border: 1px solid #333; border-radius: 20px;
    padding: 8px 16px; font-size: 12px; font-family: var(--font-mono);
    color: var(--muted); letter-spacing: 0.05em;
    opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap; z-index: 200;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>Linkboard</h1>
  <span class="tagline">click to copy</span>
  <div class="header-actions">
    <div id="sync-dot" title="Sync status"></div>
    <button class="header-btn" id="export-btn" title="Export all buttons as JSON">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 1v7M3 5.5l3 3 3-3"/><path d="M1 9.5v1a.5.5 0 00.5.5h9a.5.5 0 00.5-.5v-1"/>
      </svg>
      export
    </button>
    <button class="header-btn" id="import-btn" title="Import buttons from JSON">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 8V1M3 3.5l3-3 3 3"/><path d="M1 9.5v1a.5.5 0 00.5.5h9a.5.5 0 00.5-.5v-1"/>
      </svg>
      import
    </button>
    <input type="file" id="import-file" accept=".json" />
  </div>
</header>

<div id="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <circle cx="6" cy="6" r="4"/><line x1="9.5" y1="9.5" x2="13" y2="13"/>
    </svg>
    <input type="text" id="search-input" placeholder="search buttons…" autocomplete="off" />
  </div>
  <div id="cat-bar"></div>
</div>

<main>
  <div id="grid"></div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">New button</h2>
    <div class="field">
      <label>Button label</label>
      <input type="text" id="input-label" placeholder="e.g. Email signature" autocomplete="off" />
    </div>
    <div class="field">
      <label>Copy text</label>
      <textarea id="input-text" placeholder="Paste whatever you want copied when this button is clicked…"></textarea>
      <div class="hint">⌘ + Enter to save</div>
    </div>
    <div class="field">
      <label>Category <span class="opt">— optional</span></label>
      <input type="text" id="input-cat" placeholder="e.g. Work, Personal…" autocomplete="off" list="cat-datalist" />
      <datalist id="cat-datalist"></datalist>
    </div>
    <div class="field">
      <label>Image <span class="opt">— optional</span></label>
      <div id="image-upload-area" class="image-upload-area">
        <div class="upload-inner">
          <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="18" height="15" rx="2.5"/>
            <circle cx="7.5" cy="10" r="1.8"/>
            <path d="M2 16l5-5 3.5 3.5 3-3 6.5 5.5"/>
          </svg>
          click to upload image
        </div>
        <input type="file" id="input-image" accept="image/*" />
      </div>
      <div class="image-preview-wrap" id="image-preview-wrap" style="display:none; margin-top:8px;">
        <img id="image-preview" class="image-preview" src="" alt="preview" />
        <button class="remove-image" id="remove-image" title="Remove image">✕</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="modal-cancel">Cancel</button>
      <button class="modal-btn primary" id="modal-save">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<button id="fab" title="Add button">
  <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
    <line x1="6.5" y1="1" x2="6.5" y2="12"/><line x1="1" y1="6.5" x2="12" y2="6.5"/>
  </svg>
  add button
</button>

<script>
// ═══════════════════════════════════════════════════════
//  Supabase
// ═══════════════════════════════════════════════════════
const SUPABASE_URL = 'https://pqneseicmwdrxstxtgdu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxbmVzZWljbXdkcnhzdHh0Z2R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDQ1NDIsImV4cCI6MjA4OTIyMDU0Mn0.wFiG9MUu_vEOWfa7SbHjMbb17Bwh3B4Woqw3DRZB8dg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ═══════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════
let buttons = [];          // local cache
let editingId = null;      // id of button being edited (null = new)
let pendingImageData = null;
let pendingImageChanged = false;
let activeCategory = 'All';
let searchQuery = '';
let ignoreNext = null;     // id to skip re-render on own realtime echo

// ═══════════════════════════════════════════════════════
//  Sync dot
// ═══════════════════════════════════════════════════════
function syncDot(state) {
  const d = document.getElementById('sync-dot');
  d.className = '';
  if (state) d.classList.add(state);
  if (state === 'ok') setTimeout(() => { if (d.classList.contains('ok')) d.className = ''; }, 1500);
}

// ═══════════════════════════════════════════════════════
//  Load all from Supabase
// ═══════════════════════════════════════════════════════
async function loadAll() {
  syncDot('syncing');
  const { data, error } = await sb.from('buttons').select('*').order('position').order('created_at');
  if (error) { syncDot('error'); showToast('could not load data'); return; }
  buttons = data.map(fromRow);
  syncDot('ok');
  render();
}

// ═══════════════════════════════════════════════════════
//  Row mapping helpers
// ═══════════════════════════════════════════════════════
function fromRow(row) {
  return {
    id:        row.id,
    label:     row.label,
    text:      row.text,
    category:  row.category || null,
    hasImage:  row.has_image || false,
    imageData: row.image_data || null,
    position:  row.position || 0,
  };
}

function toRow(btn) {
  return {
    id:         btn.id,
    label:      btn.label,
    text:       btn.text,
    category:   btn.category || null,
    has_image:  btn.hasImage || false,
    image_data: btn.imageData || null,
    position:   btn.position || 0,
  };
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// ═══════════════════════════════════════════════════════
//  Real-time subscription
// ═══════════════════════════════════════════════════════
function subscribeRealtime() {
  sb.channel('buttons-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'buttons' }, payload => {
      const { eventType, new: newRow, old: oldRow } = payload;

      // Skip echoes of our own writes
      const affectedId = (newRow && newRow.id) || (oldRow && oldRow.id);
      if (affectedId && affectedId === ignoreNext) { ignoreNext = null; return; }

      if (eventType === 'INSERT') {
        if (!buttons.find(b => b.id === newRow.id)) {
          buttons.push(fromRow(newRow));
          buttons.sort((a,b) => a.position - b.position);
        }
      } else if (eventType === 'UPDATE') {
        const idx = buttons.findIndex(b => b.id === newRow.id);
        if (idx !== -1) buttons[idx] = fromRow(newRow);
        else buttons.push(fromRow(newRow));
      } else if (eventType === 'DELETE') {
        buttons = buttons.filter(b => b.id !== oldRow.id);
      }
      render();
    })
    .subscribe();
}

// ═══════════════════════════════════════════════════════
//  Categories
// ═══════════════════════════════════════════════════════
function getCategories() {
  const cats = new Set();
  buttons.forEach(b => { if (b.category) cats.add(b.category); });
  return ['All', ...Array.from(cats).sort()];
}

function renderCatBar() {
  const bar = document.getElementById('cat-bar');
  bar.innerHTML = '';
  const cats = getCategories();
  const dl = document.getElementById('cat-datalist');
  dl.innerHTML = '';
  cats.filter(c => c !== 'All').forEach(c => {
    const opt = document.createElement('option'); opt.value = c; dl.appendChild(opt);
  });
  // Reset active if category no longer exists
  if (activeCategory !== 'All' && !cats.includes(activeCategory)) activeCategory = 'All';
  cats.forEach(cat => {
    const pill = document.createElement('button');
    pill.className = 'cat-pill' + (cat === activeCategory ? ' active' : '');
    pill.textContent = cat;
    pill.addEventListener('click', () => { activeCategory = cat; renderCatBar(); renderGrid(); });
    bar.appendChild(pill);
  });
}

// ═══════════════════════════════════════════════════════
//  Grid
// ═══════════════════════════════════════════════════════
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const q = searchQuery.toLowerCase();
  const visible = buttons.filter(btn => {
    const matchCat = activeCategory === 'All' || btn.category === activeCategory;
    const matchSearch = !q || btn.label.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  if (visible.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = searchQuery ? 'no results' : 'no buttons yet — add one below';
    grid.appendChild(empty);
  }

  visible.forEach(btn => {
    const wrap = document.createElement('div');
    wrap.className = 'btn-wrap';

    const b = document.createElement('button');
    b.className = 'link-btn';
    b.title = 'Click to copy';
    b.addEventListener('click', () => copyText(btn.id, b));

    if (btn.hasImage && btn.imageData) {
      const img = document.createElement('img');
      img.className = 'btn-image';
      img.src = btn.imageData;
      img.alt = btn.label;
      b.appendChild(img);
    }

    const labelEl = document.createElement('span');
    labelEl.className = 'btn-label';
    labelEl.textContent = btn.label;
    b.appendChild(labelEl);

    if (btn.category && activeCategory === 'All') {
      const tag = document.createElement('span');
      tag.className = 'btn-cat-tag';
      tag.textContent = btn.category;
      b.appendChild(tag);
    }

    const actions = document.createElement('div');
    actions.className = 'btn-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'action-btn';
    editBtn.title = 'Edit';
    editBtn.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 1.5L10.5 3.5L4 10H2V8L8.5 1.5Z"/></svg>`;
    editBtn.addEventListener('click', e => { e.stopPropagation(); openEdit(btn.id); });

    const delBtn = document.createElement('button');
    delBtn.className = 'action-btn del';
    delBtn.title = 'Delete';
    delBtn.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>`;
    delBtn.addEventListener('click', e => { e.stopPropagation(); deleteBtn(btn.id); });

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    wrap.appendChild(b);
    wrap.appendChild(actions);
    grid.appendChild(wrap);
  });

  // Add button always lives in the grid as last cell
  const addWrap = document.createElement('div');
  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn';
  addBtn.innerHTML = `<svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="6.5" y1="1" x2="6.5" y2="12"/><line x1="1" y1="6.5" x2="12" y2="6.5"/></svg>Add button`;
  addBtn.addEventListener('click', openAdd);
  addWrap.appendChild(addBtn);
  grid.appendChild(addWrap);
}

function render() { renderCatBar(); renderGrid(); }

// ═══════════════════════════════════════════════════════
//  Copy
// ═══════════════════════════════════════════════════════
function copyText(id, el) {
  const btn = buttons.find(b => b.id === id);
  if (!btn) return;
  const text = btn.text;
  const flash = () => {
    el.classList.add('copied');
    showToast('copied');
    setTimeout(() => el.classList.remove('copied'), 1200);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(flash).catch(() => fallbackCopy(text, flash));
  } else {
    fallbackCopy(text, flash);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;white-space:pre';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  cb();
}

// ═══════════════════════════════════════════════════════
//  CRUD — all writes go straight to Supabase
// ═══════════════════════════════════════════════════════
async function deleteBtn(id) {
  syncDot('syncing');
  ignoreNext = id;
  const { error } = await sb.from('buttons').delete().eq('id', id);
  if (error) { syncDot('error'); showToast('delete failed'); ignoreNext = null; return; }
  buttons = buttons.filter(b => b.id !== id);
  syncDot('ok');
  render();
  showToast('deleted');
}

function resetModal() {
  pendingImageData = null;
  pendingImageChanged = false;
  document.getElementById('input-label').value = '';
  document.getElementById('input-text').value = '';
  document.getElementById('input-cat').value = '';
  document.getElementById('input-image').value = '';
  document.getElementById('image-preview-wrap').style.display = 'none';
  document.getElementById('image-preview').src = '';
  document.getElementById('image-upload-area').style.display = '';
}

function openAdd() {
  editingId = null;
  resetModal();
  if (activeCategory !== 'All') document.getElementById('input-cat').value = activeCategory;
  document.getElementById('modal-title').textContent = 'New button';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('input-label').focus(), 60);
}

function openEdit(id) {
  const btn = buttons.find(b => b.id === id);
  if (!btn) return;
  editingId = id;
  resetModal();
  document.getElementById('modal-title').textContent = 'Edit button';
  document.getElementById('input-label').value = btn.label;
  document.getElementById('input-text').value = btn.text || '';
  document.getElementById('input-cat').value = btn.category || '';
  if (btn.hasImage && btn.imageData) {
    pendingImageData = btn.imageData;
    document.getElementById('image-preview').src = btn.imageData;
    document.getElementById('image-preview-wrap').style.display = '';
    document.getElementById('image-upload-area').style.display = 'none';
  }
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('input-label').focus(), 60);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

async function saveModal() {
  const label = document.getElementById('input-label').value.trim();
  const text  = document.getElementById('input-text').value;
  const category = document.getElementById('input-cat').value.trim();
  if (!label || !text) return;

  syncDot('syncing');
  closeModal();

  if (editingId) {
    // UPDATE
    const existing = buttons.find(b => b.id === editingId);
    const updated = {
      ...existing,
      label,
      text,
      category: category || null,
      hasImage: pendingImageChanged ? !!pendingImageData : existing.hasImage,
      imageData: pendingImageChanged ? (pendingImageData || null) : existing.imageData,
    };
    ignoreNext = editingId;
    const { error } = await sb.from('buttons').update(toRow(updated)).eq('id', editingId);
    if (error) { syncDot('error'); showToast('save failed'); ignoreNext = null; return; }
    const idx = buttons.findIndex(b => b.id === editingId);
    if (idx !== -1) buttons[idx] = updated;
  } else {
    // INSERT
    const newBtn = {
      id: genId(),
      label,
      text,
      category: category || null,
      hasImage: !!pendingImageData,
      imageData: pendingImageData || null,
      position: buttons.length,
    };
    ignoreNext = newBtn.id;
    const { error } = await sb.from('buttons').insert(toRow(newBtn));
    if (error) { syncDot('error'); showToast('save failed'); ignoreNext = null; return; }
    buttons.push(newBtn);
  }

  syncDot('ok');
  render();
  showToast(editingId ? 'saved' : 'added');
}

// ═══════════════════════════════════════════════════════
//  Export / Import
// ═══════════════════════════════════════════════════════
function exportData() {
  const json = JSON.stringify({ version: 2, exported: new Date().toISOString(), buttons }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `linkboard-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('exported');
}

async function importData(file) {
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    const incoming = data.buttons || data;
    if (!Array.isArray(incoming)) throw new Error('invalid');

    syncDot('syncing');
    let added = 0;
    for (const entry of incoming) {
      if (!entry.label) continue;
      const newBtn = {
        id: genId(),
        label: entry.label,
        text: entry.text || '',
        category: entry.category || null,
        hasImage: !!(entry.imageData || entry.image_data),
        imageData: entry.imageData || entry.image_data || null,
        position: buttons.length + added,
      };
      const { error } = await sb.from('buttons').insert(toRow(newBtn));
      if (!error) { buttons.push(newBtn); added++; }
    }
    syncDot('ok');
    render();
    showToast(`imported ${added} button${added !== 1 ? 's' : ''}`);
  } catch(e) {
    syncDot('error');
    showToast('import failed — invalid file');
  }
}

// ═══════════════════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1600);
}

// ═══════════════════════════════════════════════════════
//  Events
// ═══════════════════════════════════════════════════════
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value; renderGrid();
});

document.getElementById('input-image').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImageData = ev.target.result;
    pendingImageChanged = true;
    document.getElementById('image-preview').src = pendingImageData;
    document.getElementById('image-preview-wrap').style.display = '';
    document.getElementById('image-upload-area').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

document.getElementById('remove-image').addEventListener('click', () => {
  pendingImageData = null;
  pendingImageChanged = true;
  document.getElementById('input-image').value = '';
  document.getElementById('image-preview').src = '';
  document.getElementById('image-preview-wrap').style.display = 'none';
  document.getElementById('image-upload-area').style.display = '';
});

document.getElementById('export-btn').addEventListener('click', exportData);
document.getElementById('import-btn').addEventListener('click', () => document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) { importData(file); e.target.value = ''; }
});

document.getElementById('fab').addEventListener('click', openAdd);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-save').addEventListener('click', saveModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) saveModal();
});

// ═══════════════════════════════════════════════════════
//  Boot
// ═══════════════════════════════════════════════════════
loadAll().then(() => subscribeRealtime());
</script>
